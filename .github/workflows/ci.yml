name: backend
run-name: "${{ github.actor }} - rosadmin CI"
on:
    pull_request:
    push:
        branches: [main]

permissions:
    contents: read
    pull-requests: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        name: Offline test & lint
        runs-on: ubuntu-24.04

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # gitleaks needs history in-tree

            - name: Install uv
              uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
              with:
                  version: "0.11.16"
                  enable-cache: true

            - name: Install Python
              run: uv python install

            - name: Install dependencies (including dev)
              run: uv sync --locked --dev

            - name: Check formatting (ruff)
              run: uv run ruff format --check .

            - name: Lint (ruff - imports + SQL)
              run: uv run ruff check .

            - name: Run Pyright
              uses: jakebailey/pyright-action@8ec14b5cfe41f26e5f41686a31eb6012758217ef # v3.0.2
              with:
                  pylance-version: latest-release
                  python-path: .venv/bin/python

            - name: Behave (offline suites; @live excluded)
              run: uv run behave --tags="not @live"

            - name: Pytest (unit)
              # No container runtime in this job: exclude the integration suite.
              run: uv run pytest -m "not integration"

            - name: gitleaks
              uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
