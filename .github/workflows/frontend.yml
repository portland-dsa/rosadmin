name: frontend
run-name: "${{ github.actor }} — frontend check"
on:
    pull_request:
    push:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: frontend-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        name: Lint & build
        runs-on: ubuntu-24.04
        defaults:
            run:
                working-directory: frontend

        steps:
            - uses: actions/checkout@v6

            - name: Install Node
              uses: actions/setup-node@v4
              with:
                  node-version-file: frontend/.nvmrc
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Lint (eslint)
              run: npm run lint

            - name: Build (tsc + vite)
              run: npm run build
