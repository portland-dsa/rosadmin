# PostgreSQL settings for the rosadmin cluster: loopback + socket only, scram, and
# no TLS (there is no non-loopback path for it to protect). rosadmin runs its own
# cluster, so this is self-contained - install as
# /etc/postgresql/18/rosadmin/conf.d/10-rosadmin.conf (Debian's postgresql.conf
# reads conf.d/), then: systemctl restart postgresql@18-rosadmin
listen_addresses = 'localhost'          # 127.0.0.1/::1 only - never '*'
port = 5433                             # rosadmin's own cluster; botonio keeps 5432
unix_socket_directories = '/var/run/postgresql'
password_encryption = 'scram-sha-256'   # never write an md5 hash
ssl = off                               # loopback + socket only; an unused TLS stack is just surface

# Pin the display zone explicitly so the cluster does not inherit whatever box it
# was created on. Storage is unaffected (TIMESTAMPTZ is always UTC on disk); this
# controls how timestamps display and how the server log is stamped.
timezone = 'America/Los_Angeles'
log_timezone = 'America/Los_Angeles'
