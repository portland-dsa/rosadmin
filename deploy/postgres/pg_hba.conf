# Access control for the rosadmin cluster. Order matters (first match wins; the
# final rejects are the backstop). No trust and no md5 anywhere: the runtime role
# reaches only its own database over the socket by peer; the migration role only
# over TCP loopback by scram-sha-256. rosadmin runs its own cluster, so install as
# /etc/postgresql/18/rosadmin/pg_hba.conf, then:
#   systemctl reload postgresql@18-rosadmin

# TYPE  DATABASE            USER                          ADDRESS        METHOD
# Runtime role: Unix socket, peer auth via the pg_ident map. No password.
local   rosadmin_staging    rosadmin_staging_app                         peer map=rosmap

# Migration role: TCP loopback, scram-sha-256 (password is a systemd credential).
host    rosadmin_staging    rosadmin_staging_migrate      127.0.0.1/32   scram-sha-256
host    rosadmin_staging    rosadmin_staging_migrate      ::1/128        scram-sha-256

# Production, same shape as staging but scoped to its own database. Each role
# reaches only rosadmin_production: the runtime role by peer over the socket
# (mapped by rosmap in pg_ident), the migration role by scram over TCP loopback.
local   rosadmin_production rosadmin_production_app                      peer map=rosmap
host    rosadmin_production rosadmin_production_migrate   127.0.0.1/32   scram-sha-256
host    rosadmin_production rosadmin_production_migrate   ::1/128        scram-sha-256

# Local maintenance: the postgres superuser over the socket, peer.
local   all               postgres                                  peer

# Everything else is refused.
local   all               all                                       reject
host    all               all                        0.0.0.0/0      reject
host    all               all                        ::/0           reject
