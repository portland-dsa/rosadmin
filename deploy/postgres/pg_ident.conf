# Map the hyphenated OS service user to a tidy PG role name (used by the
# `peer map=rosmap` line in pg_hba.conf). rosadmin runs its own cluster, so install
# as /etc/postgresql/18/rosadmin/pg_ident.conf, then:
#   systemctl reload postgresql@18-rosadmin

# MAPNAME  SYSTEM-USERNAME       PG-USERNAME
rosmap     rosadmin-staging      rosadmin_staging_app
rosmap     rosadmin-production   rosadmin_production_app
